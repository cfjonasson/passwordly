# Passwordly Single File Website

```html
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Passwordly</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #0f172a;
      color: white;
      min-height: 100vh;
    }

    nav {
      width: 100%;
      padding: 20px 40px;
      background: #111827;
      border-bottom: 1px solid #1f2937;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    nav h1 {
      font-size: 28px;
      color: #3b82f6;
    }

    nav p {
      color: #94a3b8;
      font-size: 14px;
    }

    .container {
      max-width: 1200px;
      margin: auto;
      padding: 40px 20px;
    }

    .hero {
      text-align: center;
      margin-bottom: 50px;
    }

    .hero h2 {
      font-size: 65px;
      margin-bottom: 15px;
    }

    .hero span {
      color: #3b82f6;
    }

    .hero p {
      color: #94a3b8;
      font-size: 20px;
    }

    .dashboard {
      display: grid;
      grid-template-columns: 350px 1fr;
      gap: 25px;
    }

    .panel {
      background: #111827;
      border-radius: 20px;
      padding: 25px;
      border: 1px solid #1f2937;
    }

    .panel h3 {
      margin-bottom: 20px;
      font-size: 22px;
    }

    .form {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .form input {
      background: #1e293b;
      border: none;
      padding: 14px;
      border-radius: 12px;
      color: white;
      outline: none;
    }

    .form button {
      background: #3b82f6;
      border: none;
      padding: 14px;
      border-radius: 12px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    .form button:hover {
      transform: scale(1.02);
      background: #2563eb;
    }

    .search {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: #1e293b;
      color: white;
      margin-bottom: 20px;
    }

    .passwords {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
    }

    .card {
      background: #1e293b;
      border-radius: 18px;
      padding: 20px;
      border: 1px solid #334155;
      transition: 0.2s;
    }

    .card:hover {
      transform: translateY(-5px);
    }

    .card h4 {
      font-size: 22px;

    .card p {
      color: #94a3b8;
      margin-bottom: 15px;
      word-break: break-all;

    .password-box {
      background: #0f172a;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 15px;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-buttons {
      display: flex;
      gap: 10px;
    }

    .copy-btn,
    .delete-btn {
      flex: 1;
      border: none;
      padding: 12px;
      border-radius: 10px;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    .copy-btn {
      background: #22c55e;
    }

    .delete-btn {
      background: #ef4444;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin-bottom: 25px;
    }

    .stat {
      background: #1e293b;
      padding: 20px;
      border-radius: 15px;
      text-align: center;
    }

    .stat h2 {
      color: #3b82f6;
      font-size: 32px;
      margin-bottom: 8px;
    }

    .stat p {
      color: #94a3b8;
    }

    footer {
      text-align: center;
      color: #64748b;
      padding: 40px 20px;
    }

    @media (max-width: 900px) {
      .dashboard {
        grid-template-columns: 1fr;
      }

      .hero h2 {
        font-size: 45px;
      }

      .stats {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <nav>
    <div>
      <h1>Passwordly</h1>
      <p>Store all your passwords in one place</p>
    </div>
  </nav>

  <div class="container">

    <div class="hero">
      <h2>Welcome to <span>Passwordly</span></h2>
      <p>Store all your passwords in one place</p>
    </div>

    <div class="stats">
      <div class="stat">
        <h2 id="totalPasswords">0</h2>
        <p>Saved Passwords</p>
      </div>

      <div class="stat">
        <h2 id="copiedCount">0</h2>
        <p>Passwords Copied</p>
      </div>

      <div class="stat">
        <h2>100%</h2>
        <p>Local Storage</p>
      </div>
    </div>

    <div class="dashboard">

      <div class="panel">
        <h3>Add Password</h3>

        <form class="form" id="passwordForm">
          <input type="text" id="website" placeholder="Website" required />
          <input type="text" id="username" placeholder="Username" required />
          <input type="password" id="password" placeholder="Password" required />

          <button type="submit">Save Password</button>
        </form>
      </div>

      <div class="panel">
        <input
          type="text"
          class="search"
          id="search"
          placeholder="Search passwords..."
        />

        <div class="passwords" id="passwordContainer"></div>
      </div>

    </div>
  </div>

  <footer>
    Passwordly © 2026 — Store all your passwords in one place
  </footer>

  <script>
    const form = document.getElementById('passwordForm');
    const website = document.getElementById('website');
    const username = document.getElementById('username');
    const password = document.getElementById('password');
    const container = document.getElementById('passwordContainer');
    const search = document.getElementById('search');

    const totalPasswords = document.getElementById('totalPasswords');
    const copiedCount = document.getElementById('copiedCount');

    let copied = 0;

    let passwords = JSON.parse(localStorage.getItem('passwordly')) || [];

    function updateStats() {
      totalPasswords.textContent = passwords.length;
      copiedCount.textContent = copied;
    }

    function savePasswords() {
      localStorage.setItem('passwordly', JSON.stringify(passwords));
    }

    function renderPasswords(filter = '') {
      container.innerHTML = '';

      const filtered = passwords.filter(item =>
        item.website.toLowerCase().includes(filter.toLowerCase())
      );

      filtered.reverse().forEach(item => {
        const card = document.createElement('div');
        card.className = 'card';

        card.innerHTML = `
          <h4>${item.website}</h4>
          <p>${item.username}</p>

          <div class="password-box">
            ${item.password}
          </div>

          <div class="card-buttons">
            <button class="copy-btn">Copy</button>
            <button class="delete-btn">Delete</button>
          </div>
        `;

        card.querySelector('.copy-btn').addEventListener('click', () => {
          navigator.clipboard.writeText(item.password);
          copied++;
          updateStats();
          alert('Password copied!');
        });

        card.querySelector('.delete-btn').addEventListener('click', () => {
          passwords = passwords.filter(p => p.id !== item.id);
          savePasswords();
          renderPasswords(search.value);
          updateStats();
        });

        container.appendChild(card);
      });
    }

    form.addEventListener('submit', (e) => {
      e.preventDefault();

      passwords.push({
        id: Date.now(),
        website: website.value,
        username: username.value,
        password: password.value
      });

      savePasswords();
      renderPasswords(search.value);
      updateStats();

      form.reset();
    });

    search.addEventListener('input', () => {
      renderPasswords(search.value);
    });

    renderPasswords();
    updateStats();
  </script>

</body>
</html>
